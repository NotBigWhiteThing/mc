<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 1.12.2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        #loginBox {
            text-align: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
    </style>
</head>

<body>

    <div id="loginBox">
        <h2>Enter Password</h2>
        <input type="password" id="passwordInput" placeholder="Password">
        <br><br>
        <button onclick="checkPassword()">Enter</button>
        <p id="error" style="color:red;"></p>
    </div>

    <iframe id="gameFrame" src="https://r2.ch3n.cc/eag/index.html" allow="*"></iframe>

    <script>
        function checkPassword() {
            const input = document.getElementById("passwordInput").value;
            const correct = "doordash67";

            if (input === correct) {
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("gameFrame").style.display = "block";
            } else {
                document.getElementById("error").textContent = "yea thats what i thought stupid kids this site is not for you";
            }
        }
    </script>

</body>

</html>
